{% extends "base.html" %}
<!-- Herda o layout base (estrutura geral da página, CSS, etc.) -->
{% block content %}
<!-- Define o bloco de conteúdo que será inserido no base.html -->
<div class="chat-container">
    <!-- Container principal do chat -->
    <div id="chatBox" class="chat-box"></div>
    <!-- Área onde as mensagens (usuário e IA) serão exibidas -->
    <div class="input-area">
        <!-- Área de entrada do usuário -->
        <textarea id="pergunta" placeholder="Digite sua pergunta sobre métricas de software..."></textarea>
        <!-- Campo onde o usuário digita a pergunta -->
        <button id="btnEnviar">Enviar</button>
        <!-- Botão para enviar a pergunta -->
        <button id="btnLimpar" class="btn-limpar">Limpar Histórico</button>
        <!-- Botão para apagar o histórico do chat -->
    </div>
</div>
<script>
// Aguarda o carregamento completo do HTML antes de executar o JS
document.addEventListener("DOMContentLoaded", function () {
    // ==============================
    // REFERÊNCIAS DOS ELEMENTOS
    // ==============================
    // Campo de entrada
    const input = document.getElementById("pergunta");
    // Caixa onde ficam as mensagens
    const chatBox = document.getElementById("chatBox");
    // Botão enviar
    const btnEnviar = document.getElementById("btnEnviar");
    // Botão limpar histórico
    const btnLimpar = document.getElementById("btnLimpar");
    // ==============================
    // PERSISTÊNCIA (LOCALSTORAGE)
    // ==============================
    // Salva o conteúdo do chat no navegador
    function salvarChat() {
        // Armazena o HTML completo do chat
        localStorage.setItem("chatHistorico", chatBox.innerHTML);
    }
    // Carrega o histórico salvo
    function carregarChat() {
        const historico = localStorage.getItem("chatHistorico");
        if (historico) {
            // Restaura o conteúdo do chat
            chatBox.innerHTML = historico;
            // Scroll automático para o final
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }
    // Limpa o histórico
    function limparChat() {
        // Remove do armazenamento
        localStorage.removeItem("chatHistorico");
        // Limpa a interface
        chatBox.innerHTML = "";
    }

    // Carrega histórico automaticamente ao abrir a página
    carregarChat();


    // ==============================
    // FUNÇÃO PRINCIPAL (ENVIO)
    // ==============================

    async function enviarPergunta() {

        // Remove espaços extras
        const pergunta = input.value.trim();

        // Se estiver vazio, não faz nada
        if (!pergunta) return;


        // ==============================
        // EXIBE MENSAGEM DO USUÁRIO
        // ==============================

        const userMsg = document.createElement("div");
        userMsg.className = "msg user"; // classe CSS para estilizar
        userMsg.innerText = pergunta;

        chatBox.appendChild(userMsg);

        // Salva no histórico
        salvarChat();

        // Limpa o campo de entrada
        input.value = "";

        // Scroll para o final
        chatBox.scrollTop = chatBox.scrollHeight;


        // ==============================
        // INDICADOR "DIGITANDO..."
        // ==============================

        const typingIndicator = document.createElement("div");
        typingIndicator.className = "typing";

        // Animação com três pontos
        typingIndicator.innerHTML = `
            <span></span>
            <span></span>
            <span></span>
        `;

        chatBox.appendChild(typingIndicator);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // ==============================
            // REQUISIÇÃO PARA O BACKEND (/ask)
            // ==============================

            const response = await fetch("/ask", {
                method: "POST",
                headers: { "Content-Type": "application/json" },

                // Envia a pergunta em formato JSON
                body: JSON.stringify({ question: pergunta })
            });

            if (!response.ok) {
                throw new Error(`Erro HTTP: ${response.status}`);
            }

            // ==============================
            // PREPARAÇÃO PARA STREAMING
            // ==============================

            // reader → lê a resposta em partes (stream)
            const reader = response.body.getReader();

            // decoder → converte bytes para texto
            const decoder = new TextDecoder("utf-8");

            let buffer = "";

            // Remove o indicador "digitando..."
            if (typingIndicator.parentNode) {
                chatBox.removeChild(typingIndicator);
            }

            // ==============================
            // CRIA MENSAGEM DA IA
            // ==============================

            const iaMsg = document.createElement("div");
            iaMsg.className = "msg ia";

            chatBox.appendChild(iaMsg);

            // ==============================
            // LEITURA DO STREAM (RESPOSTA)
            // ==============================

            while (true) {

                // Lê um pedaço da resposta
                const { done, value } = await reader.read();

                // Se terminou, sai do loop
                if (done) break;

                // Converte bytes em texto e acumula no buffer
                buffer += decoder.decode(value, { stream: true });

                // Atualiza o conteúdo da mensagem da IA
                iaMsg.innerText = buffer;

                // Mantém scroll no final
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            // Se o buffer estiver vazio, mostra mensagem
            if (!buffer || buffer.trim() === "") {
                iaMsg.innerText = "Desculpe, não consegui processar sua pergunta. Verifique se o Ollama está rodando.";
            }

        } catch (error) {
            console.error("Erro ao enviar pergunta:", error);
            
            // Remove indicador se ainda estiver visível
            if (typingIndicator.parentNode) {
                chatBox.removeChild(typingIndicator);
            }

            // Exibe mensagem de erro
            const erroMsg = document.createElement("div");
            erroMsg.className = "msg ia";
            erroMsg.innerText = `❌ Erro: ${error.message}\n\nVerifique:\n1. O Ollama está rodando? (http://localhost:11434)\n2. O modelo llama3:8b está instalado?\n3. Verifique o console para mais detalhes.`;
            chatBox.appendChild(erroMsg);
        }

        // ==============================
        // SALVA HISTÓRICO
        // ==============================

        salvarChat();
    }


    // ==============================
    // EVENTOS
    // ==============================

    // Clique no botão "Enviar"
    btnEnviar.addEventListener("click", enviarPergunta);

    // Clique no botão "Limpar"
    btnLimpar.addEventListener("click", limparChat);


    // Enviar com Enter (sem Shift)
    input.addEventListener("keydown", function (e) {

        // Enter sem Shift envia
        if (e.key === "Enter" && !e.shiftKey) {

            e.preventDefault(); // impede quebra de linha

            enviarPergunta();
        }
    });
});
</script>
{% endblock %}
