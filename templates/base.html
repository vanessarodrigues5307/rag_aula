<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <!-- Define codificação UTF-8 (acentos, caracteres especiais, etc.) -->
    <title>MetricaIA - Assistente de Métricas de Software</title>
    <!-- Título da aba do navegador -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Importa o arquivo CSS da pasta static do Flask -->
</head>
<body>
<header>
    <!-- Cabeçalho da aplicação -->
    <div class="header-container">
        <!-- Container para organizar os elementos do header -->
        <h1>MetricaIA</h1>
        <!-- Nome do sistema -->
        <p>
            Assistente Inteligente para Métricas e Medição de Software
        </p>
        <!-- Subtítulo explicando o propósito do sistema -->
        <nav>
            <!-- Menu de navegação com as 3 abas -->
            <a href="{{ url_for('home') }}" class="{% if request.endpoint == 'home' %}active{% endif %}">Sobre</a>
            <!-- Link para a página sobre (Aba 1) -->
            <a href="{{ url_for('chat') }}" class="{% if request.endpoint == 'chat' %}active{% endif %}">Chat</a>
            <!-- Link para o chat interativo (Aba 2) -->
            <a href="{{ url_for('recursos') }}" class="{% if request.endpoint == 'recursos' %}active{% endif %}">Recursos</a>
            <!-- Link para recursos e referências (Aba 3) -->
        </nav>
    </div>
</header>


<main>
    <!-- Área principal da página -->
    {% block content %}{% endblock %}
    <!-- Aqui será inserido o conteúdo das outras páginas -->
</main>
<footer>
    <!-- Rodapé da aplicação -->
    © 2026 MetricaIA | Plataforma de Suporte a Métricas e Medição de Software
    <!-- Texto institucional -->
</footer>
</body>
</html>
