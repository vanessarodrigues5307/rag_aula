<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <!-- Define codificação UTF-8 (acentos, caracteres especiais, etc.) -->
    <title>AgroIA Café - Assistente Inteligente</title>
    <!-- Título da aba do navegador (ajustado para o contexto de café + IA) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Importa o arquivo CSS da pasta static do Flask -->
</head>
<body>
<header>
    <!-- Cabeçalho da aplicação -->
    <div class="header-container">
        <!-- Container para organizar os elementos do header -->
        <h1>AgroIA Café</h1>
        <!-- Nome do sistema (marca do projeto) -->
        <p>
            Assistente Inteligente para Cafeicultura
        </p>
        <!-- Subtítulo explicando o propósito do sistema -->
        <nav>
            <!-- Menu de navegação -->
            <a href="{{ url_for('home') }}">Consulta IA</a>
            <!-- Link para a página principal (chat com IA) -->
            <a href="{{ url_for('institucional') }}">Quem Somos</a>
            <!-- Link para a página institucional -->
        </nav>
    </div>
</header>


<main>
    <!-- Área principal da página -->
    {% block content %}{% endblock %}
    <!-- Aqui será inserido o conteúdo das outras páginas (index, institucional, etc.) -->
</main>
<footer>
    <!-- Rodapé da aplicação  alt+0169 -->
    © 2026 AgroIA Café | Plataforma de Apoio à Cafeicultura com IA
    <!-- Texto institucional adaptado para o contexto agrícola -->
</footer>
</body>
</html>
